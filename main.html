<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested HTML Tables</title>
    
</head>
<body>
	<table border>
		<tr>
			<td>
				<table>
					<tr>
						<th colspan="2">Nested Table2</th>
					</tr>
					<tr>
						<th>Column1</th>
						<th>Column2</th>
					</tr>
					<tr>
						<td>abc</td>
						<td>def</td>
					</tr>
					
				</table>
				
			</td>
			<td>
				<table>
					<tr>
						<th colspan="2">Nested Table1</th>
					</tr>
					<tr>
						<td colspan="2" rowspan="3">
							<ul>
								<li>List item</li>
								<li>List item</li>
								<li>List item</li>
							</ul>							
						</td>
					</tr>
				</table>
			</td>
		</tr>
		
		<tr>
			<td>
				<table>
				<tr>
					<th colspan="2">Nested Table3</th>
				</tr>
				<tr>
					<td>
						Nested Table
					</td>
					<td>Demo Continued</td>
				</tr>
			</table>
			</td>
			<td>
				<table>
					<tr>
						<th colspan="2">Nested Table 4</th>
					</tr>
					<tr>
						<td id="black" colspan="2">HTML</td>
					</tr>
					
				</table>
			</td>
		</tr>
		


		
	</table>


</body>
</html>
